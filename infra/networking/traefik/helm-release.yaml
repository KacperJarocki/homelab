apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik
  namespace: networking
spec:
  interval: 5m
  install:
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
  chart:
    spec:
      chart: traefik
      version: "40.0.0"
      sourceRef:
        kind: HelmRepository
        name: traefik
        namespace: networking
  values:
    deployment:
      kind: DaemonSet

    ingressRoute:
      dashboard:
        enabled: true
        entryPoints:
          - websecure
        matchRule: Host(`traefik.homelab.kacperjarocki.dev`)
        tls:
          secretName: traefik-tls
