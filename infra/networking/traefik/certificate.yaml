apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: traefik
  namespace: networking
spec:
  secretName: traefik-tls
  issuerRef:
    name: letsencrypt-http-prod
    kind: ClusterIssuer
  commonName: traefik.homelab.kacperjarocki.dev
  dnsNames:
    - traefik.homelab.kacperjarocki.dev
